<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xeon Store</title>

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

.logo{
    width:180px;
    margin:15px auto;
    display:block;
}

.games{
    background:#bdbdbd;
    padding:30px;
    margin-top:20px;
}

.games h2{
    margin-bottom:30px;
}

.game{
    width:85%;
    max-width:650px;
    margin:25px auto;
    display:flex;
    align-items:center;
    text-decoration:none;
    color:black;
    font-size:38px;
    font-weight:bold;
    border-radius:35px;
    padding:20px;
    transition:.2s;
}

.game:hover{
    transform:scale(1.03);
}

.game img{
    width:80px;
    height:80px;
    margin-right:20px;
}

.banana{
    background:#ff9800;
    border:6px solid #ffe66d;
}

.soap{
    background:#97ecff;
    border:6px solid #4dc8ff;
}

.apple{
    background:#ffd7c3;
    border:6px solid #ff3d57;
}

.fakead{
    background:#d1b3ff;
    border:6px solid #8a4dff;
}
</style>
</head>

<body>

<h1>Добро пожаловать</h1>

<img class="logo" src="Screenshot_20260704_175539.jpg">

<h1>Xeon Store</h1>

href="https://greshampopygay-png.github.io/banana-clicker/">
